<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRImo Ultra - Persistent Secret</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bri-blue: #00529C; --bri-orange: #FF7F00; --bg: #F4F8FB; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Open Sans', sans-serif; }
        body { background-color: var(--bg); overflow-x: hidden; width: 100vw; }
        .app-container { width: 100%; min-height: 100vh; background: white; position: relative; padding-bottom: 40px; }
        
        .header-bg {
            background: linear-gradient(180deg, #06549d 0%, #0a69c0 50%, #ffffff 100%);
            height: 380px; width: 100%; position: absolute; top: 0; z-index: 1;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }

        .content { position: relative; z-index: 2; padding: 45px 18px 0; }

        /* Nav */
        .nav-top { display: flex; justify-content: space-between; align-items: flex-start; color: white; margin-bottom: 25px; }
        .logo-section { display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 42px; }
        .greet b { font-size: 19px; display: block; }
        .notif-badge { background: #FF3B30; color: white; font-size: 10px; padding: 1px 5px; border-radius: 10px; position: absolute; top: -5px; right: -5px; border: 1.5px solid #06549d; }

        /* Saldo Card */
        .card-saldo {
            background: #005eb8; border-radius: 20px; padding: 22px; color: white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15); margin-bottom: 20px;
        }
        #amount { font-size: 21px; font-weight: 700; }
        .dots { letter-spacing: 5px; font-size: 24px; }

        /* Quick Menu */
        .menu-bar-blue {
            background: #003d73; border-radius: 20px; padding: 20px 10px;
            display: grid; grid-template-columns: repeat(4, 1fr); margin-bottom: 25px;
        }
        .m-icon { background: rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 14px; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .m-item span { color: white; font-size: 10px; display: block; text-align: center; }

        /* Search */
        .search-wrap { margin-bottom: 25px; position: relative; }
        .search-wrap i { position: absolute; left: 18px; top: 14px; color: var(--bri-blue); }
        .search-bar { width: 100%; padding: 14px 50px; border-radius: 30px; border: 1px solid #E5E9F2; outline: none; }

        /* Grid Features */
        .f-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px 5px; margin-bottom: 25px; }
        .f-item { text-align: center; position: relative; cursor: pointer; }
        .f-icon { width: 54px; height: 54px; border-radius: 16px; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .f-item p { font-size: 11px; font-weight: 600; color: #333; line-height: 1.2; }
        .dot-notif { width: 11px; height: 11px; background: #FF3B30; border-radius: 50%; border: 2px solid white; position: absolute; top: 0; right: 12px; }

        /* Icon Colors */
        .c-green { background: #E8F7ED; color: #27AE60; }
        .c-cyan { background: #E3F8F9; color: #00BCD4; }
        .c-blue { background: #E6F0FF; color: #2D9CDB; }
        .c-pink { background: #FCEEF3; color: #E91E63; }
        .c-orange { background: #FFF5E6; color: #F2994A; }

        /* Widget Catatan */
        .widget { background: white; border-radius: 20px; padding: 20px; border: 1px solid #F1F4F9; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .w-title { font-size: 15px; font-weight: 700; color: #333; display: flex; align-items: center; }
        .mo-style { color: var(--bri-orange); font-weight: 400; font-size: 18px; margin-left: 2px; display: inline-block; line-height: 1; }
        .w-toggle { color: var(--bri-blue); font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .b-val { font-size: 14px; font-weight: 700; transition: all 0.2s; }
        .val-hidden { letter-spacing: 2px; font-size: 16px; color: #999; }

        /* --- SECRET MODAL UI --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 9999;
            display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: white; width: 100%; max-width: 350px;
            border-radius: 28px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .modal-content h3 { font-size: 20px; color: var(--bri-blue); margin-bottom: 25px; text-align: center; font-weight: 800; }
        .modal-input-group { margin-bottom: 18px; }
        .modal-input-group label { font-size: 10px; color: #999; display: block; margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .modal-input-group input { 
            width: 100%; padding: 14px; border: 2px solid #f0f0f0; border-radius: 12px;
            font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--bri-blue); outline: none;
        }
        .modal-input-group input:focus { border-color: var(--bri-blue); }
        .btn-apply {
            width: 100%; background: var(--bri-blue); color: white; border: none;
            padding: 16px; border-radius: 14px; font-weight: 700; margin-top: 10px; cursor: pointer; font-size: 15px;
        }
        .btn-reset {
            width: 100%; background: #fdf0f0; color: #eb5757; border: none;
            padding: 12px; border-radius: 14px; font-weight: 700; margin-top: 10px; cursor: pointer; font-size: 13px;
        }
        /* animasi ringan */
        .date-update-toast {
            animation: fadeUp 0.3s ease-out;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="modal-overlay" id="secretModal">
    <div class="modal-content">
        <h3><i class="fa-solid fa-gears"></i> Sultan Mode</h3>
        <div class="modal-input-group">
            <label>Saldo Utama</label>
            <input type="text" id="inputSaldo" placeholder="Contoh: 500.000.000">
        </div>
        <div class="modal-input-group">
            <label>Pemasukan</label>
            <input type="text" id="inputIn" placeholder="Contoh: 100.000.000">
        </div>
        <div class="modal-input-group">
            <label>Pengeluaran</label>
            <input type="text" id="inputOut" placeholder="Contoh: 5.000.000">
        </div>
        <button class="btn-apply" onclick="applyCheat()">Update & Save</button>
        <button class="btn-reset" onclick="resetSystem()">Reset to Default</button>
        <p style="text-align: center; margin-top: 20px; font-size: 12px; color: #bbb; cursor: pointer;" onclick="closeModal()">Tutup</p>
    </div>
</div>

<div class="app-container">
    <div class="header-bg"></div>
    <div class="content">
        
        <div class="nav-top">
            <div class="logo-section">
                <img src="https://b.top4top.io/p_3771nmt3d0.png" class="logo-img">
                <div class="greet">Hai,<br><b>MrAl</b></div>
            </div>
            <div style="position:relative;"><i class="fa-regular fa-bell" style="font-size: 24px;"></i><span class="notif-badge">17</span></div>
        </div>

        <div class="card-saldo">
            <p>Saldo Rekening Utama</p>
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                <span id="amount" class="dots">●●●●●●</span>
                <i id="eye-saldo" class="fa-regular fa-eye-slash" onclick="toggleSaldo()" style="cursor:pointer; font-size: 18px;"></i>
            </div>
            <div style="border-top:1px solid rgba(255,255,255,0.2); padding-top:12px; display:flex; justify-content:space-between; font-size:13px; font-weight:600;">
                <span>Semua Rekeningmu</span><i class="fa-solid fa-chevron-right"></i>
            </div>
        </div>

        <div class="menu-bar-blue">
            <div class="m-item"><div class="m-icon"><i class="fa-solid fa-right-left"></i></div><span>Transfer</span></div>
            <div class="m-item"><div class="m-icon"><i class="fa-solid fa-file-invoice-dollar"></i></div><span>BRIVA</span></div>
            <div class="m-item"><div class="m-icon"><i class="fa-solid fa-wallet"></i></div><span>E-Wallet</span></div>
            <div class="m-item"><div class="m-icon"><i class="fa-solid fa-mobile-screen"></i></div><span>Pulsa/Data</span></div>
        </div>

        <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" class="search-bar" placeholder="Cari Fitur">
        </div>

        <div class="f-grid">
            <div class="f-item"><div class="f-icon c-green"><i class="fa-solid fa-wallet"></i></div><span class="dot-notif"></span><p>Top Up</p></div>
            <div class="f-item"><div class="f-icon c-cyan"><i class="fa-solid fa-file-invoice"></i></div><p>Tagihan</p></div>
            <div class="f-item"><div class="f-icon c-blue"><i class="fa-solid fa-money-bill-transfer"></i></div><p>Setor Tarik</p></div>
            <div class="f-item"><div class="f-icon c-pink"><i class="fa-solid fa-bag-shopping"></i></div><p>Lifestyle</p></div>
            <div class="f-item"><div class="f-icon c-blue" style="background:#EBF3FF;"><i class="fa-solid fa-qrcode"></i></div><span class="dot-notif"></span><p>QRIS</p></div>
            <div class="f-item"><div class="f-icon c-blue" style="background:#EBF8FF; color:#56CCF2;"><i class="fa-solid fa-credit-card"></i></div><p>Debit Virtual</p></div>
            <div class="f-item"><div class="f-icon c-orange"><i class="fa-solid fa-book"></i></div><p>Catatan</p></div>
            
            <div class="f-item" onclick="openSecretMenu()">
                <div class="f-icon c-orange" style="background:#FFF0E6;"><i class="fa-solid fa-seedling"></i></div>
                <p>Investasi</p>
            </div>
        </div>

        <div style="text-align:center; color:#00529C; font-size:13px; font-weight:700; margin-bottom:25px;">Lainnya <i class="fa-solid fa-chevron-down" style="font-size:10px;"></i></div>

        <div class="widget">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                <div class="w-title">Catatan Keuangan<span class="mo-style">mo</span></div>
                <div class="w-toggle" onclick="toggleWidget()">
                    <span id="toggle-text">Sembunyikan</span> 
                    <i id="eye-widget" class="fa-regular fa-eye-slash"></i>
                </div>
            </div>
            <!-- PERIODE DINAMIS : akan otomatis update setiap kali pemasukan/pengeluaran berubah -->
            <div id="date-range-container" style="font-size:12px; color:#666; margin-bottom:15px; transition: all 0.2s;">1 Apr 2026 - 30 Apr 2026</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <div style="border-left:3px solid #2ecc71; padding-left:10px;">
                    <p style="font-size:11px; color:#666;">Pemasukan</p>
                    <p id="in-val" class="b-val">Rp0</p>
                </div>
                <div style="border-left:3px solid #e74c3c; padding-left:10px;">
                    <p style="font-size:11px; color:#666;">Pengeluaran</p>
                    <p id="out-val" class="b-val">-Rp0</p>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    // ========================
    // PERSISTENT ENGINE + OTOMATIS UPDATE TANGGAL BERDASARKAN PERUBAHAN PEMASUKAN / PENGELUARAN
    // ========================
    
    // DEFINE DEFAULTS (Default awal: pemasukan 0, pengeluaran 14jt -> tanggal referensi 1 April - 30 April 2026)
    const DEFAULTS = {
        saldo: "1",
        pemasukan: "0",
        pengeluaran: "14.000.000"
    };

    // Load data dari LocalStorage atau pake Default
    let db = JSON.parse(localStorage.getItem('brimo_ultra_data')) || DEFAULTS;

    let saldoShow = false;
    let widgetShow = true;

    // --- HELPER: format Rupiah agar rapi (opsional untuk tampilan, tapi kita gunakan langsung dari db) ---
    function formatRupiah(angkaStr) {
        if(!angkaStr) return "0";
        let str = angkaStr.toString().replace(/\./g, '');
        let number = parseFloat(str);
        if(isNaN(number)) return angkaStr;
        return number.toLocaleString('id-ID');
    }
    
    // Fungsi untuk mendapatkan tampilan angka yang rapi untuk UI
    function getDisplayNumber(value) {
        if(value === undefined || value === null) return "0";
        let clean = value.toString().replace(/\./g, '');
        let num = parseFloat(clean);
        if(isNaN(num)) return value;
        return num.toLocaleString('id-ID');
    }

    // =============== KUNCI UTAMA: Update range tanggal berdasarkan data pemasukan & pengeluaran ===============
    // Aturan: Tanggal akan otomatis berganti ke periode yang mencerminkan "periode laporan terbaru"
    // Konteks: setiap kali user ubah pemasukan atau pengeluaran, maka tanggal langsung update ke (bulan/tahun saat ini) 
    // namun dengan sentuhan dinamis: Jika pemasukan / pengeluaran bernilai > 0, tanggal akan menunjukkan bulan dan tahun sekarang.
    // Agar menarik, kita buat sistem cerdas: Tanggal terupdate mengikuti "waktu modifikasi terakhir" secara virtual.
    // Karena permintaan "ubah tanggal nya itu otomatis update pas gw ubah pengeluaran dan pemasukan"
    // Kita implementasi: Setiap kali fungsi refreshDisplay atau setelah apply cheat, date range akan diupdate berdasarkan 
    // timestamp perubahan terakhir atau berdasarkan bulan saat ini dengan efek bahwa seolah olah laporan keuangan terbaru.
    
    // Variabel untuk menyimpan last update date range (Dynamic Month)
    let lastFinancialUpdate = null;

    // Fungsi generate periode dinamis: Mengembalikan string "1 <Bulan> <Tahun> - <LastDate> <Bulan> <Tahun>"
    function getDynamicDateRange() {
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth(); // 0-indexed
        const firstDay = new Date(currentYear, currentMonth, 1);
        const lastDay = new Date(currentYear, currentMonth + 1, 0);
        
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
        const startMonth = monthNames[firstDay.getMonth()];
        const endMonth = monthNames[lastDay.getMonth()];
        const startDate = `1 ${startMonth} ${firstDay.getFullYear()}`;
        const endDate = `${lastDay.getDate()} ${endMonth} ${lastDay.getFullYear()}`;
        return `${startDate} - ${endDate}`;
    }

    // Fungsi update elemen tanggal di widget dengan animasi ringan (memberi efek perubahan)
    function updateDateRangeDisplay() {
        const dateElement = document.getElementById('date-range-container');
        if(dateElement) {
            const newDateStr = getDynamicDateRange();
            // Hanya update jika konten berbeda agar tidak membebani
            if(dateElement.innerText !== newDateStr) {
                dateElement.innerText = newDateStr;
                // tambahkan efek transisi cepat
                dateElement.classList.add('date-update-toast');
                setTimeout(() => {
                    dateElement.classList.remove('date-update-toast');
                }, 300);
            } else {
                dateElement.innerText = newDateStr;
            }
        }
    }

    // Fungsi yang menandakan bahwa ada perubahan data keuangan (pemasukan/pengeluaran)
    // Maka kita panggil updateDateRangeDisplay() 
    function onFinancialDataChanged() {
        // Update tanggal dinamis berdasarkan bulan/saat ini untuk mencerminkan keadaan update terbaru
        updateDateRangeDisplay();
        // (optional) simpan timestamp perubahan ke dalam db untuk kebutuhan lain, tapi tidak diperlukan karena setiap refresh sudah sinkron
    }

    // Fungsi Update Teks di UI (Saldo, Pemasukan, Pengeluaran, dan widget)
    function refreshDisplay() {
        // Format agar tampil dengan pemisah ribuan lebih rapi
        const formattedSaldo = getDisplayNumber(db.saldo);
        const formattedPemasukan = getDisplayNumber(db.pemasukan);
        const formattedPengeluaran = getDisplayNumber(db.pengeluaran);
        
        // Update DOM dengan data yang ada
        if(saldoShow) {
            document.getElementById('amount').innerText = "Rp" + formattedSaldo;
        } else {
            document.getElementById('amount').innerText = "●●●●●●";
        }

        if(widgetShow) {
            document.getElementById('in-val').innerText = "Rp" + formattedPemasukan;
            document.getElementById('out-val').innerText = "-Rp" + formattedPengeluaran;
            document.getElementById('toggle-text').innerText = "Sembunyikan";
            document.getElementById('eye-widget').classList.remove('fa-eye');
            document.getElementById('eye-widget').classList.add('fa-eye-slash');
        } else {
            document.getElementById('in-val').innerText = "•••••";
            document.getElementById('out-val').innerText = "•••••";
            document.getElementById('toggle-text').innerText = "Tampilkan";
            document.getElementById('eye-widget').classList.remove('fa-eye-slash');
            document.getElementById('eye-widget').classList.add('fa-eye');
        }
        
        // Setiap refreshDisplay juga memastikan tanggal terupdate (apapun perubahan nilai)
        // Karena pemanggilan bisa berasal dari applyCheat atau resetSystem yang mengubah db pemasukan/pengeluaran.
        updateDateRangeDisplay();
    }

    // Toggle Saldo Utama
    function toggleSaldo() {
        const i = document.getElementById('eye-saldo');
        const b = document.getElementById('amount');
        if(!saldoShow) { 
            saldoShow = true;
            b.classList.remove('dots');
            i.classList.replace('fa-eye-slash','fa-eye'); 
        } else { 
            saldoShow = false;
            b.classList.add('dots');
            i.classList.replace('fa-eye','fa-eye-slash'); 
        }
        refreshDisplay();
    }

    // Toggle Widget Catatan
    function toggleWidget() {
        widgetShow = !widgetShow;
        const inE = document.getElementById('in-val');
        const outE = document.getElementById('out-val');
        
        if(!widgetShow) {
            inE.classList.add('val-hidden');
            outE.classList.add('val-hidden');
        } else {
            inE.classList.remove('val-hidden');
            outE.classList.remove('val-hidden');
        }
        refreshDisplay();
    }

    // --- SECRET MENU FUNCTIONS (Sultan Mode) Dengan Auto Update Tanggal ---
    function openSecretMenu() {
        document.getElementById('secretModal').style.display = 'flex';
        document.getElementById('inputSaldo').value = db.saldo;
        document.getElementById('inputIn').value = db.pemasukan;
        document.getElementById('inputOut').value = db.pengeluaran;
    }

    function closeModal() {
        document.getElementById('secretModal').style.display = 'none';
    }

    function applyCheat() {
        // Baca input dari form modal
        let rawSaldo = document.getElementById('inputSaldo').value.trim();
        let rawIn = document.getElementById('inputIn').value.trim();
        let rawOut = document.getElementById('inputOut').value.trim();
        
        // Normalisasi: jika kosong pakai existing, jika tidak maka bersihkan titik dan koma opsional
        if(rawSaldo === "") rawSaldo = db.saldo;
        if(rawIn === "") rawIn = db.pemasukan;
        if(rawOut === "") rawOut = db.pengeluaran;
        
        // Fungsi untuk membersihkan input (menghilangkan titik dan koma serta spasi) sehingga hanya angka tersisa
        function cleanNumber(str) {
            if(str === undefined) return "";
            // Hapus semua titik, koma, spasi, selain angka
            let cleaned = str.toString().replace(/\./g, '').replace(/,/g, '').replace(/\s/g, '');
            // Jika mengandung huruf, tetap akan ambil angka pertama, tapi kita validasi sederhana
            if(isNaN(parseFloat(cleaned))) return "0";
            return cleaned;
        }
        
        let newSaldo = cleanNumber(rawSaldo);
        let newIn = cleanNumber(rawIn);
        let newOut = cleanNumber(rawOut);
        
        // Pastikan tidak negatif untuk pemasukan/pengeluaran dan saldo bisa 0
        if(parseFloat(newIn) < 0) newIn = "0";
        if(parseFloat(newOut) < 0) newOut = "0";
        if(parseFloat(newSaldo) < 0) newSaldo = "0";
        
        // Update database
        db.saldo = newSaldo;
        db.pemasukan = newIn;
        db.pengeluaran = newOut;
        
        // Simpan ke localStorage setelah perubahan
        localStorage.setItem('brimo_ultra_data', JSON.stringify(db));
        
        // *** TANGGAL AKAN OTOMATIS UPDATE saat refreshDisplay dipanggil, karena ada updateDateRangeDisplay di dalamnya.
        refreshDisplay();
        
        // Tambahan: notifikasi kalau tanggal ikut berubah (sesuai permintaan: update pas ubah pengeluaran & pemasukan)
        // Kita panggil onFinancialDataChanged secara eksplisit (meskipun sudah ada di refreshDisplay)
        onFinancialDataChanged();
        
        closeModal();
        alert("Data keuangan diperbarui! Periode tanggal otomatis menyesuaikan dengan waktu terkini.");
    }

    function resetSystem() {
        if(confirm("Reset ke pengaturan awal? (Saldo Rp1 , Pemasukan 0, Pengeluaran 14jt)")) {
            // Reset ke DEFAULTS penuh
            db.saldo = DEFAULTS.saldo;
            db.pemasukan = DEFAULTS.pemasukan;
            db.pengeluaran = DEFAULTS.pengeluaran;
            localStorage.setItem('brimo_ultra_data', JSON.stringify(db));
            refreshDisplay();
            onFinancialDataChanged(); // update tanggal ke periode sekarang setelah reset
            closeModal();
            alert("System telah direset. Tanggal catatan menggunakan periode terbaru.");
        }
    }
    
    // === BONUS: Menambahkan listener perubahan manual langsung dari halaman? Tidak perlu, karena semua operasi modifikasi data keuangan
    // hanya melalui Secret Modal (Investasi). Namun sesuai kebutuhan kalau ada perubahan via console atau lain, 
    // tapi yang penting saat applyCheat dan resetSystem akan otomatis meng-update tanggal. 
    // Sudah memenuhi: "ubah tanggal nya itu otomatis update pas gw ubah pengeluaran dan pemasukan"
    // Dan juga Jika nilai pemasukan/pengeluaran berubah (angka), tanggal range akan selalu mencerminkan bulan & tahun saat transaksi terakhir.
    
    // Inisialisasi awal: set tanggal dinamis saat load pertama
    window.addEventListener('DOMContentLoaded', () => {
        refreshDisplay();
        // memastikan tanggal terupdate saat loading juga (jika ada data localStorage sebelumnya, tanggal mengikuti waktu sekarang)
        updateDateRangeDisplay();
        
        // Seandainya ada perubahan eksternal (bisa dari localStorage lain tab), tapi kita abaikan 
        // Tapi dengan gaya hidup, setiap refresh halaman atau perubahan internal, tanggal berganti.
    });
    
    // Sinkronisasi tanggal jika ada perubahan data dari localStorage event (berguna jika ada multi tab, tapi tidak krusial)
    window.addEventListener('storage', (e) => {
        if(e.key === 'brimo_ultra_data' && e.newValue) {
            try {
                const newDb = JSON.parse(e.newValue);
                if(newDb) {
                    db = newDb;
                    refreshDisplay();
                    updateDateRangeDisplay();
                }
            } catch(err) {}
        }
    });
    
    // Override global untuk memastikan fungsi2 tersedia di inline onclick
    window.toggleSaldo = toggleSaldo;
    window.toggleWidget = toggleWidget;
    window.openSecretMenu = openSecretMenu;
    window.applyCheat = applyCheat;
    window.resetSystem = resetSystem;
    window.closeModal = closeModal;
    
</script>
</body>
</html>
